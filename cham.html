<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>설문조사</title>
  <style>
    :root { --max: 720px; --gap: 12px; --bd: #e5e7eb; --fg:#111827; --muted:#6b7280; --btn:#111827; --btnfg:#fff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; color:var(--fg); background:#fff; }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 28px 18px 40px; }
    .card { border:1px solid var(--bd); border-radius:16px; padding:18px; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    p { margin: 0 0 14px; color: var(--muted); line-height:1.4; }

    .grid { display:grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: var(--gap); }
    .btn { width:100%; padding:14px 12px; border-radius:12px; border:1px solid var(--bd); background:#fff; cursor:pointer; font-weight:700; }
    .btn:hover { border-color:#cbd5e1; }
    .btn-primary { background: var(--btn); color: var(--btnfg); border-color: var(--btn); }
    .btn-primary:disabled { opacity:.45; cursor:not-allowed; }

    .row { display:flex; gap: var(--gap); align-items:center; justify-content:flex-end; margin-top: 16px; flex-wrap: wrap; }
    .question { font-size: 18px; font-weight: 800; margin: 0 0 12px; }
    .options { display:grid; gap: 10px; margin-top: 8px; }
    label.opt { display:flex; align-items:center; gap:10px; padding:12px 12px; border:1px solid var(--bd); border-radius:12px; cursor:pointer; }
    label.opt:hover { border-color:#cbd5e1; }
    input[type="radio"] { transform: scale(1.15); }

    .tag { display:inline-block; font-size:12px; padding:4px 10px; border-radius:999px; border:1px solid var(--bd); color: var(--muted); }
    .imgbox { width:100%; border:1px solid var(--bd); border-radius:16px; overflow:hidden; background:#f9fafb; }
    .imgbox img { display:block; width:100%; height:auto; }

    .done { min-height: 60vh; display:flex; align-items:center; justify-content:center; font-size: 18px; font-weight: 800; }
    .small { font-size: 12px; color: var(--muted); margin-top: 10px; }

    /* intro */
    .intro {
      min-height: 60vh;
      display:flex;
      flex-direction: column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap: 14px;
      padding: 10px 6px;
      position: relative;
    }
    .intro-title { font-size: 22px; font-weight: 900; letter-spacing: -0.2px; margin: 0; }
    .admin-btn {
      position:absolute; top: 10px; right: 10px;
      font-size: 12px; padding: 8px 10px; border-radius: 999px;
      border:1px solid var(--bd); background:#fff; cursor:pointer; font-weight:800;
      width:auto;
    }
    .admin-btn:hover { border-color:#cbd5e1; }

    /* login */
    .loginBox { max-width: 340px; margin: 0 auto; width:100%; }
    .input {
      width: 100%;
      max-width: 340px;
      padding: 10px 12px;
      border: 1px solid var(--bd);
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }
    .input:focus { border-color:#cbd5e1; }

    /* admin list */
    .list { display:grid; gap:10px; margin-top: 12px; }
    .item { border:1px solid var(--bd); border-radius:12px; padding:12px; cursor:pointer; }
    .item:hover { border-color:#cbd5e1; }
    .item-top { display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size:12px; color: var(--muted); }
    pre { white-space: pre-wrap; word-break: break-word; background:#f9fafb; border:1px solid var(--bd); border-radius:12px; padding:12px; margin-top: 12px; }

    @media (max-width:520px){
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .loginBox { max-width: 100%; }
      .input { max-width: 100%; }
    }
  </style>
</head>
<body>
  <!-- ✅ 반드시 있어야 함 -->
  <div id="app"></div>

  <script>
    /***********************
     * ✅ 너의 Google Apps Script Web App URL
     ***********************/
    const GS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzzDv9AJbOzFDKOhmYCu6hqTSzMRzTZMqxalFU2uG1kno-ITzVK02BU70hZSwTbeL1faA/exec";

    /***********************
     * 이미지
     ***********************/
    const IMG_32_2 = "https://i.postimg.cc/h4kn2r7Y/bd5d9d79-0a73-4acd-91a6-ac885ce3b680.jpg";
    const IMAGE_URLS = {
      a: { img31_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img31_2:IMG_32_2, img32_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img32_2:IMG_32_2 },
      b: { img31_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img31_2:IMG_32_2, img32_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img32_2:IMG_32_2 },
      c: { img31_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img31_2:IMG_32_2, img32_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img32_2:IMG_32_2 },
      d: { img31_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img31_2:IMG_32_2, img32_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img32_2:IMG_32_2 },
      e: { img31_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img31_2:IMG_32_2, img32_1:"https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg", img32_2:IMG_32_2 },
    };

    /***********************
     * 관리자 (프론트 저장용 - 강한 보안 아님)
     ***********************/
    const ADMIN_PASSWORD = "1234";
    const STORAGE_KEY_ADMIN = "survey_admin_authed_v1";

    const state = {
      firstChoice: null,
      route: null,
      answers: { q1:null, q2:null, q3:null },
      adminRows: [],
    };

    const $app = () => document.getElementById("app");

    // ✅ 같은 hash일 때도 router 강제 실행
    const setHash = (h) => {
      if (location.hash === h) {
        router();
      } else {
        location.hash = h;
        setTimeout(router, 0);
      }
    };

    function isAdminAuthed(){ return localStorage.getItem(STORAGE_KEY_ADMIN) === "1"; }
    function setAdminAuthed(v){ localStorage.setItem(STORAGE_KEY_ADMIN, v ? "1" : "0"); }

    function getVariantTitle(choice){
      const map = { a:"A", b:"B", c:"C", d:"D", e:"E" };
      return map[choice] ? `${map[choice]} 타입 설문` : "설문";
    }

    function renderShell(innerHtml){
      const el = $app();
      if (!el) {
        console.error("#app not found");
        return;
      }
      el.innerHTML = `<div class="wrap"><div class="card">${innerHtml}</div></div>`;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    /***********************
     * ✅ Google Sheets 저장(POST)
     * - 응답을 못 읽는(no-cors) 방식이지만 저장은 됨
     ***********************/
    async function saveToGoogleSheets(payload){
      await fetch(GS_WEBAPP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      return true;
    }

    /***********************
     * ✅ 관리자 목록(JSONP로 조회) - "페이지 죽음" 방지 버전
     ***********************/
function fetchAdminList({ limit = 200 } = {}){
  return new Promise((resolve, reject) => {
    const cbName = "jsonp_cb_" + Math.random().toString(16).slice(2);
    const script = document.createElement("script");

    const url = `${GS_WEBAPP_URL}?action=list&limit=${encodeURIComponent(limit)}&callback=${encodeURIComponent(cbName)}&_=${Date.now()}`;

    let finished = false;
    const cleanup = () => {
      if (finished) return;
      finished = true;
      try { delete window[cbName]; } catch(e){}
      try { script.remove(); } catch(e){}
      try { clearTimeout(tid); } catch(e){}
    };

    window[cbName] = (data) => {
      cleanup();
      resolve(data);
    };

    script.onload = () => {
      // onload 됐는데 callback이 안 불리면, 응답이 JS가 아니라 HTML/리다이렉트/빈 응답일 수 있음
      console.log("[JSONP] script loaded:", url);
      // callback이 정상 호출되면 위에서 cleanup되므로 여기서 뭘 하진 않음
    };

    script.onerror = () => {
      cleanup();
      reject(new Error("Admin list JSONP load error (script.onerror)"));
    };

    const tid = setTimeout(() => {
      console.warn("[JSONP] timeout:", url);
      cleanup();
      reject(new Error("Admin list JSONP timeout (callback not called)"));
    }, 8000);

    script.async = true;
    script.src = url;
    document.head.appendChild(script);
  });
}

    /***********************
     * Pages
     ***********************/
    function pageIntro(){
      renderShell(`
        <div class="intro">
          <button class="admin-btn" id="adminGo">관리자</button>
          <h1 class="intro-title">챔빠와 함께하는 논문여행</h1>
          <div class="row" style="justify-content:center; width:100%; margin-top:6px;">
            <button id="start" class="btn btn-primary" style="max-width:240px;">시작하기</button>
          </div>
        </div>
      `);

      document.getElementById("start").addEventListener("click", () => setHash("#/"));
      document.getElementById("adminGo").addEventListener("click", () => setHash("#/admin-login"));
    }

    function page1(){
      renderShell(`
        <div>
          <h1>설문 시작</h1>
          <p>아래 버튼 중 하나를 선택하세요. (선택에 따라 이후 페이지가 달라집니다)</p>
          <div class="grid">
            ${["a","b","c","d","e"].map(ch => `<button class="btn" data-choice="${ch}">${ch}</button>`).join("")}
          </div>
        </div>
      `);

      document.querySelectorAll("button[data-choice]").forEach(btn => {
        btn.addEventListener("click", () => {
          const choice = btn.getAttribute("data-choice");
          state.firstChoice = choice;
          state.route = null;
          state.answers = { q1:null, q2:null, q3:null };
          setHash("#/q1");
        });
      });
    }

    function radioQuestion({ title, qKey, nextHash }){
      const current = state.answers[qKey];
      renderShell(`
        <div>
          <div class="tag">${getVariantTitle(state.firstChoice)}</div>
          <h1 style="margin-top:10px;">${title}</h1>
          <p>항목 5개 중 하나만 선택 가능합니다.</p>

          <div class="question">잘하고 있습니까?</div>
          <div class="options" role="radiogroup" aria-label="score">
            ${[1,2,3,4,5].map(v => `
              <label class="opt">
                <input type="radio" name="${qKey}" value="${v}" ${String(current)===String(v) ? "checked":""}/>
                <span>${v}점</span>
              </label>
            `).join("")}
          </div>

          <div class="row">
            <button id="next" class="btn btn-primary" disabled>다음</button>
          </div>
        </div>
      `);

      const radios = [...document.querySelectorAll(`input[name="${qKey}"]`)];
      const nextBtn = document.getElementById("next");

      function sync(){
        const picked = radios.find(r => r.checked)?.value ?? null;
        state.answers[qKey] = picked ? Number(picked) : null;
        nextBtn.disabled = !state.answers[qKey];
      }
      radios.forEach(r => r.addEventListener("change", sync));
      sync();

      nextBtn.addEventListener("click", () => {
        if (!state.answers[qKey]) return;
        setHash(nextHash);
      });
    }

    function pageQ1(){
      if (!state.firstChoice) return setHash("#/");
      radioQuestion({ title: "두번째 페이지", qKey: "q1", nextHash: "#/rand" });
    }

    function pageRand(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      state.route = (Math.random() < 0.5) ? "3-1" : "3-2";
      setHash(state.route === "3-1" ? "#/3-1/1" : "#/3-2/1");
    }

    function imagePage({ title, imgUrl, nextHash, lockSeconds }){
      renderShell(`
        <div>
          <div class="tag">${getVariantTitle(state.firstChoice)}</div>
          <h1 style="margin-top:10px;">${title}</h1>
          <p>${lockSeconds ? `페이지 접속 후 ${lockSeconds}초 뒤 ‘다음’ 버튼이 활성화됩니다.` : "‘다음’ 버튼을 눌러 진행하세요."}</p>

          <div class="imgbox">
            <img src="${imgUrl}" alt="설문 이미지" />
          </div>

          <div class="row">
            <button id="next" class="btn btn-primary" ${lockSeconds ? "disabled":""}>다음</button>
          </div>
          ${lockSeconds ? `<div class="small" id="countdown"></div>` : ""}
        </div>
      `);

      const nextBtn = document.getElementById("next");
      if (!lockSeconds) {
        nextBtn.addEventListener("click", ()=> setHash(nextHash));
        return;
      }

      const cd = document.getElementById("countdown");
      let remain = lockSeconds;
      cd.textContent = `활성화까지 ${remain}초`;
      const timer = setInterval(() => {
        remain -= 1;
        if (remain <= 0){
          clearInterval(timer);
          cd.textContent = "버튼이 활성화되었습니다.";
          nextBtn.disabled = false;
          return;
        }
        cd.textContent = `활성화까지 ${remain}초`;
      }, 1000);

      nextBtn.addEventListener("click", () => {
        if (nextBtn.disabled) return;
        setHash(nextHash);
      });
    }

    function page31_1(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      const imgUrl = IMAGE_URLS?.[state.firstChoice]?.img31_1;
      imagePage({ title:"3-1 페이지 (1/2)", imgUrl, nextHash:"#/3-1/2", lockSeconds:10 });
    }
    function page31_2(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      const imgUrl = IMAGE_URLS?.[state.firstChoice]?.img31_2;
      imagePage({ title:"3-1 페이지 (2/2)", imgUrl, nextHash:"#/q2", lockSeconds:10 });
    }
    function page32_1(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      const imgUrl = IMAGE_URLS?.[state.firstChoice]?.img32_1;
      imagePage({ title:"3-2 페이지 (1/2)", imgUrl, nextHash:"#/3-2/2", lockSeconds:0 });
    }
    function page32_2(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      const imgUrl = IMAGE_URLS?.[state.firstChoice]?.img32_2;
      imagePage({ title:"3-2 페이지 (2/2)", imgUrl, nextHash:"#/q2", lockSeconds:0 });
    }

    function pageQ2(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      radioQuestion({ title: "3번째(공통) 질문 페이지", qKey: "q2", nextHash: "#/q3" });
    }

    function pageQ3(){
      if (!state.firstChoice || !state.answers.q1 || !state.answers.q2) return setHash("#/");
      const current = state.answers.q3;

      renderShell(`
        <div>
          <div class="tag">${getVariantTitle(state.firstChoice)}</div>
          <h1 style="margin-top:10px;">네번째(마지막) 페이지</h1>
          <p>항목 5개 중 하나만 선택 가능합니다. ‘전송하기’를 누르면 결과가 Google Sheets로 저장됩니다.</p>

          <div class="question">잘하고 있습니까?</div>
          <div class="options" role="radiogroup" aria-label="score">
            ${[1,2,3,4,5].map(v => `
              <label class="opt">
                <input type="radio" name="q3" value="${v}" ${String(current)===String(v) ? "checked":""}/>
                <span>${v}점</span>
              </label>
            `).join("")}
          </div>

          <div class="row">
            <button id="send" class="btn btn-primary" disabled>전송하기</button>
          </div>
          <div class="small" id="status"></div>
        </div>
      `);

      const radios = [...document.querySelectorAll(`input[name="q3"]`)];
      const sendBtn = document.getElementById("send");
      const status = document.getElementById("status");

      function sync(){
        const picked = radios.find(r => r.checked)?.value ?? null;
        state.answers.q3 = picked ? Number(picked) : null;
        sendBtn.disabled = !state.answers.q3;
      }
      radios.forEach(r => r.addEventListener("change", sync));
      sync();

      sendBtn.addEventListener("click", async () => {
        if (!state.answers.q3) return;

        const payload = {
          id: (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + "_" + Math.random().toString(16).slice(2)),
          firstChoice: state.firstChoice,
          route: state.route,
          q1: state.answers.q1,
          q2: state.answers.q2,
          q3: state.answers.q3,
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent,
        };

        sendBtn.disabled = true;
        status.textContent = "저장 중...";

        try{
          await saveToGoogleSheets(payload);
          setHash("#/done");
        }catch(e){
          console.error(e);
          status.textContent = "저장 실패: Apps Script 배포/권한/URL 확인";
          sendBtn.disabled = false;
        }
      });
    }

    function pageDone(){
      renderShell(`<div class="done">전송이 완료되었습니다</div>`);
    }

    function pageAdminLogin(){
      renderShell(`
        <div class="loginBox">
          <h1>비밀번호</h1>
          <p>관리자용 페이지입니다.</p>
          <div style="display:grid; gap:10px; margin-top:10px;">
            <input id="pw" class="input" type="password" placeholder="비밀번호를 입력하세요" />
            <div class="row" style="justify-content:flex-start;">
              <button id="ok" class="btn btn-primary" style="max-width:160px;">확인</button>
              <button id="back" class="btn" style="max-width:160px;">뒤로</button>
            </div>
            <div class="small" id="err"></div>
          </div>
        </div>
      `);

      const pw = document.getElementById("pw");
      const err = document.getElementById("err");

      function submit(){
        if (pw.value === ADMIN_PASSWORD){
          setAdminAuthed(true);
          setHash("#/admin");
        } else {
          err.textContent = "비밀번호가 올바르지 않습니다.";
        }
      }

      document.getElementById("ok").addEventListener("click", submit);
      document.getElementById("back").addEventListener("click", ()=> setHash("#/intro"));
      pw.addEventListener("keydown", (e)=>{ if (e.key === "Enter") submit(); });
      pw.focus();
    }

    async function pageAdmin(){
      if (!isAdminAuthed()) return setHash("#/admin-login");

      renderShell(`
        <div>
          <div class="row" style="justify-content:space-between; margin-top:0;">
            <div>
              <h1 style="margin:0;">관리페이지</h1>
              <div class="small" id="cnt">불러오는 중...</div>
            </div>
            <div class="row" style="margin-top:0;">
              <button id="refresh" class="btn">새로고침</button>
              <button id="logout" class="btn">로그아웃</button>
            </div>
          </div>

          <div class="small" id="err" style="margin-top:10px;"></div>
          <div class="list" id="list"></div>
          <div id="detail"></div>
        </div>
      `);

      const cnt = document.getElementById("cnt");
      const err = document.getElementById("err");
      const listEl = document.getElementById("list");
      const detailEl = document.getElementById("detail");

      async function load(){
        err.textContent = "";
        cnt.textContent = "불러오는 중...";
        listEl.innerHTML = "";
        detailEl.innerHTML = "";

        try{
          const res = await fetchAdminList({ limit: 200 });

          // ✅ "형태 방어" (rows가 없거나 이상하면 빈 배열)
          const rows = Array.isArray(res?.rows) ? res.rows : [];

          state.adminRows = rows;
          cnt.textContent = `총 ${rows.length}건`;

          if (rows.length === 0){
            listEl.innerHTML = `<div class="small">아직 저장된 결과가 없습니다.</div>`;
            return;
          }

          listEl.innerHTML = rows.map(r => `
            <div class="item" data-id="${escapeHtml(r.id)}">
              <div class="item-top">
                <div><b>choice=${escapeHtml(r.firstChoice)}</b> · route=${escapeHtml(r.route)} · q1=${escapeHtml(r.q1)}, q2=${escapeHtml(r.q2)}, q3=${escapeHtml(r.q3)}</div>
                <div class="mono">${escapeHtml(r.timestamp)}</div>
              </div>
              <div class="mono">id=${escapeHtml(r.id)}</div>
            </div>
          `).join("");

          document.querySelectorAll(".item[data-id]").forEach(el => {
            el.addEventListener("click", () => {
              const id = el.getAttribute("data-id");
              const selected = state.adminRows.find(x => String(x.id) === String(id));
              if (!selected) return;

              detailEl.innerHTML = `
                <h1 style="margin-top:18px;">상세</h1>
                <pre>${escapeHtml(JSON.stringify(selected, null, 2))}</pre>
              `;
            });
          });

        }catch(e){
          console.error(e);
          err.textContent = String(e?.message || e || "관리 목록 조회 실패");
          cnt.textContent = "0건";
        }
      }

      document.getElementById("refresh").addEventListener("click", load);
      document.getElementById("logout").addEventListener("click", () => {
        setAdminAuthed(false);
        setHash("#/intro");
      });

      load();
    }

    function router(){
      const h = location.hash || "#/intro";
      switch (h) {
        case "#/intro": pageIntro(); break;
        case "#/admin-login": pageAdminLogin(); break;
        case "#/admin": pageAdmin(); break;

        case "#/": page1(); break;
        case "#/q1": pageQ1(); break;
        case "#/rand": pageRand(); break;

        case "#/3-1/1": state.route = "3-1"; page31_1(); break;
        case "#/3-1/2": state.route = "3-1"; page31_2(); break;

        case "#/3-2/1": state.route = "3-2"; page32_1(); break;
        case "#/3-2/2": state.route = "3-2"; page32_2(); break;

        case "#/q2": pageQ2(); break;
        case "#/q3": pageQ3(); break;

        case "#/done": pageDone(); break;

        default:
          setHash("#/intro");
      }
    }

    // ✅ 첫 로드시 인트로 강제
    (function forceIntroOnFirstLoad(){
      const BOOT_KEY = "survey_boot_v1";
      const h = location.hash || "";
      const firstLoad = !sessionStorage.getItem(BOOT_KEY);

      if (firstLoad) {
        sessionStorage.setItem(BOOT_KEY, "1");
        if (h === "" || h === "#" || h === "#/") {
          location.hash = "#/intro";
        }
      }
    })();

    document.addEventListener("DOMContentLoaded", () => {
      window.addEventListener("hashchange", router);
      router();
    });
  </script>
</body>
</html>
