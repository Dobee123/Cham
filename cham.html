<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>설문조사</title>
  <style>
    :root { --max: 720px; --gap: 12px; --bd: #e5e7eb; --fg:#111827; --muted:#6b7280; --btn:#111827; --btnfg:#fff; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; color:var(--fg); background:#fff; }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 28px 18px 40px; }
    .card { border:1px solid var(--bd); border-radius:16px; padding:18px; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    p { margin: 0 0 14px; color: var(--muted); line-height:1.4; }
    .grid { display:grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: var(--gap); }
    .btn { width:100%; padding:14px 12px; border-radius:12px; border:1px solid var(--bd); background:#fff; cursor:pointer; font-weight:700; }
    .btn:hover { border-color:#cbd5e1; }
    .btn-primary { background: var(--btn); color: var(--btnfg); border-color: var(--btn); }
    .btn-primary:disabled { opacity:.45; cursor:not-allowed; }
    .row { display:flex; gap: var(--gap); align-items:center; justify-content:flex-end; margin-top: 16px; }
    .question { font-size: 18px; font-weight: 800; margin: 0 0 12px; }
    .options { display:grid; gap: 10px; margin-top: 8px; }
    label.opt {
      display:flex; align-items:center; gap:10px; padding:12px 12px;
      border:1px solid var(--bd); border-radius:12px; cursor:pointer;
    }
    label.opt:hover { border-color:#cbd5e1; }
    input[type="radio"] { transform: scale(1.15); }
    .tag { display:inline-block; font-size:12px; padding:4px 10px; border-radius:999px; border:1px solid var(--bd); color: var(--muted); }
    .imgbox { width:100%; border:1px solid var(--bd); border-radius:16px; overflow:hidden; background:#f9fafb; }
    .imgbox img { display:block; width:100%; height:auto; }
    .done { min-height: 100vh; display:flex; align-items:center; justify-content:center; font-size: 18px; font-weight: 800; }
    .small { font-size: 12px; color: var(--muted); margin-top: 10px; }

    .intro {
      min-height: 60vh;
      display:flex;
      flex-direction: column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap: 14px;
      padding: 10px 6px;
    }
    .intro-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.2px;
      margin: 0;
    }
    @media (max-width:520px){
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script>
    const EMAILJS_PUBLIC_KEY = "YOUR_EMAILJS_PUBLIC_KEY";
    const EMAILJS_SERVICE_ID = "YOUR_EMAILJS_SERVICE_ID";
    const EMAILJS_TEMPLATE_ID = "YOUR_EMAILJS_TEMPLATE_ID";

    // ✅ 모든 32-2 이미지는 이걸로 통일
    const IMG_32_2 = "https://i.postimg.cc/h4kn2r7Y/bd5d9d79-0a73-4acd-91a6-ac885ce3b680.jpg";

    const IMAGE_URLS = {
      a: {
        img31_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img31_2: IMG_32_2,  // ✅ 줄바꿈 제거 + 정상 문자열
        img32_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img32_2: IMG_32_2
      },
      b: {
        img31_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img31_2: IMG_32_2,
        img32_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img32_2: IMG_32_2
      },
      c: {
        img31_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img31_2: IMG_32_2,
        img32_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img32_2: IMG_32_2
      },
      d: {
        img31_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img31_2: IMG_32_2,
        img32_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img32_2: IMG_32_2
      },
      e: {
        img31_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img31_2: IMG_32_2,
        img32_1: "https://i.postimg.cc/GmP5JPkD/a741cf88-98fe-44f0-be20-3332a571f273.jpg",
        img32_2: IMG_32_2
      },
    };

    const state = {
      firstChoice: null,
      route: null,
      answers: { q1:null, q2:null, q3:null },
    };

    const $app = () => document.getElementById("app");
    const setHash = (h) => location.hash = h;

    function safeInitEmailJS(){
      try{
        if (EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY !== "YOUR_EMAILJS_PUBLIC_KEY") {
          emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
        }
      }catch(e){
        console.warn("EmailJS init failed:", e);
      }
    }
    safeInitEmailJS();

    function getVariantTitle(choice){
      const map = { a:"A", b:"B", c:"C", d:"D", e:"E" };
      return map[choice] ? `${map[choice]} 타입 설문` : "설문";
    }

    function renderShell(innerHtml){
      $app().innerHTML = `<div class="wrap"><div class="card">${innerHtml}</div></div>`;
    }

    function pageIntro(){
      renderShell(`
        <div class="intro">
          <h1 class="intro-title">챔빠와 함께하는 논문여행</h1>
          <div class="row" style="justify-content:center; width:100%; margin-top:6px;">
            <button id="start" class="btn btn-primary" style="max-width:240px;">시작하기</button>
          </div>
        </div>
      `);

      document.getElementById("start").addEventListener("click", () => {
        setHash("#/");
      });
    }

    function radioQuestion({ title, qKey, nextHash }){
      const current = state.answers[qKey];
      renderShell(`
        <div>
          <div class="tag">${getVariantTitle(state.firstChoice)}</div>
          <h1 style="margin-top:10px;">${title}</h1>
          <p>항목 5개 중 하나만 선택 가능합니다.</p>

          <div class="question">잘하고 있습니까?</div>
          <div class="options" role="radiogroup" aria-label="score">
            ${[1,2,3,4,5].map(v => `
              <label class="opt">
                <input type="radio" name="${qKey}" value="${v}" ${String(current)===String(v) ? "checked":""}/>
                <span>${v}점</span>
              </label>
            `).join("")}
          </div>

          <div class="row">
            <button id="next" class="btn btn-primary" disabled>다음</button>
          </div>
        </div>
      `);

      const radios = [...document.querySelectorAll(`input[name="${qKey}"]`)];
      const nextBtn = document.getElementById("next");

      function sync(){
        const picked = radios.find(r => r.checked)?.value ?? null;
        state.answers[qKey] = picked ? Number(picked) : null;
        nextBtn.disabled = !state.answers[qKey];
      }
      radios.forEach(r => r.addEventListener("change", sync));
      sync();

      nextBtn.addEventListener("click", () => {
        if (!state.answers[qKey]) return;
        setHash(nextHash);
      });
    }

    function imagePage({ title, imgUrl, nextHash, lockSeconds }){
      renderShell(`
        <div>
          <div class="tag">${getVariantTitle(state.firstChoice)}</div>
          <h1 style="margin-top:10px;">${title}</h1>
          <p>${lockSeconds ? `페이지 접속 후 ${lockSeconds}초 뒤 ‘다음’ 버튼이 활성화됩니다.` : "‘다음’ 버튼을 눌러 진행하세요."}</p>

          <div class="imgbox">
            <img src="${imgUrl}" alt="설문 이미지" />
          </div>

          <div class="row">
            <button id="next" class="btn btn-primary" ${lockSeconds ? "disabled":""}>다음</button>
          </div>
          ${lockSeconds ? `<div class="small" id="countdown"></div>` : ""}
        </div>
      `);

      const nextBtn = document.getElementById("next");
      if (!lockSeconds) {
        nextBtn.addEventListener("click", ()=> setHash(nextHash));
        return;
      }

      const cd = document.getElementById("countdown");
      let remain = lockSeconds;
      cd.textContent = `활성화까지 ${remain}초`;
      const timer = setInterval(() => {
        remain -= 1;
        if (remain <= 0){
          clearInterval(timer);
          cd.textContent = "버튼이 활성화되었습니다.";
          nextBtn.disabled = false;
          return;
        }
        cd.textContent = `활성화까지 ${remain}초`;
      }, 1000);

      nextBtn.addEventListener("click", () => {
        if (nextBtn.disabled) return;
        setHash(nextHash);
      });
    }

    function page1(){
      renderShell(`
        <div>
          <h1>설문 시작</h1>
          <p>아래 버튼 중 하나를 선택하세요. (선택에 따라 이후 페이지가 달라집니다)</p>
          <div class="grid">
            ${["a","b","c","d","e"].map(ch => `
              <button class="btn" data-choice="${ch}">${ch}</button>
            `).join("")}
          </div>
        </div>
      `);

      document.querySelectorAll("button[data-choice]").forEach(btn => {
        btn.addEventListener("click", () => {
          const choice = btn.getAttribute("data-choice");
          state.firstChoice = choice;
          state.route = null;
          state.answers = { q1:null, q2:null, q3:null };
          setHash("#/q1");
        });
      });
    }

    function pageQ1(){
      if (!state.firstChoice) return setHash("#/");
      radioQuestion({ title: "두번째 페이지", qKey: "q1", nextHash: "#/rand" });
    }

    function pageRand(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      state.route = (Math.random() < 0.5) ? "3-1" : "3-2";
      setHash(state.route === "3-1" ? "#/3-1/1" : "#/3-2/1");
    }

    function page31_1(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      const imgUrl = IMAGE_URLS?.[state.firstChoice]?.img31_1;
      imagePage({ title:"3-1 페이지 (1/2)", imgUrl, nextHash:"#/3-1/2", lockSeconds:10 });
    }

    function page31_2(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      const imgUrl = IMAGE_URLS?.[state.firstChoice]?.img31_2;
      imagePage({ title:"3-1 페이지 (2/2)", imgUrl, nextHash:"#/q2", lockSeconds:10 });
    }

    function page32_1(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      const imgUrl = IMAGE_URLS?.[state.firstChoice]?.img32_1;
      imagePage({ title:"3-2 페이지 (1/2)", imgUrl, nextHash:"#/3-2/2", lockSeconds:0 });
    }

    function page32_2(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      const imgUrl = IMAGE_URLS?.[state.firstChoice]?.img32_2;
      imagePage({ title:"3-2 페이지 (2/2)", imgUrl, nextHash:"#/q2", lockSeconds:0 });
    }

    function pageQ2(){
      if (!state.firstChoice || !state.answers.q1) return setHash("#/");
      radioQuestion({ title: "3번째(공통) 질문 페이지", qKey: "q2", nextHash: "#/q3" });
    }

    function pageQ3(){
      if (!state.firstChoice || !state.answers.q1 || !state.answers.q2) return setHash("#/");
      const current = state.answers.q3;

      renderShell(`
        <div>
          <div class="tag">${getVariantTitle(state.firstChoice)}</div>
          <h1 style="margin-top:10px;">네번째(마지막) 페이지</h1>
          <p>항목 5개 중 하나만 선택 가능합니다. ‘전송하기’를 누르면 결과가 메일로 전송됩니다.</p>

          <div class="question">잘하고 있습니까?</div>
          <div class="options" role="radiogroup" aria-label="score">
            ${[1,2,3,4,5].map(v => `
              <label class="opt">
                <input type="radio" name="q3" value="${v}" ${String(current)===String(v) ? "checked":""}/>
                <span>${v}점</span>
              </label>
            `).join("")}
          </div>

          <div class="row">
            <button id="send" class="btn btn-primary" disabled>전송하기</button>
          </div>

          <div class="small" id="status"></div>
        </div>
      `);

      const radios = [...document.querySelectorAll(`input[name="q3"]`)];
      const sendBtn = document.getElementById("send");
      const status = document.getElementById("status");

      function sync(){
        const picked = radios.find(r => r.checked)?.value ?? null;
        state.answers.q3 = picked ? Number(picked) : null;
        sendBtn.disabled = !state.answers.q3;
      }
      radios.forEach(r => r.addEventListener("change", sync));
      sync();

      sendBtn.addEventListener("click", async () => {
        if (!state.answers.q3) return;

        const payload = {
          firstChoice: state.firstChoice,
          route: state.route,
          q1: state.answers.q1,
          q2: state.answers.q2,
          q3: state.answers.q3,
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent,
        };

        const emailConfigured =
          EMAILJS_PUBLIC_KEY && EMAILJS_SERVICE_ID && EMAILJS_TEMPLATE_ID &&
          EMAILJS_PUBLIC_KEY !== "YOUR_EMAILJS_PUBLIC_KEY" &&
          EMAILJS_SERVICE_ID !== "YOUR_EMAILJS_SERVICE_ID" &&
          EMAILJS_TEMPLATE_ID !== "YOUR_EMAILJS_TEMPLATE_ID";

        sendBtn.disabled = true;
        status.textContent = "전송 중...";

        try {
          if (emailConfigured) {
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
              subject: `[설문 결과] choice=${payload.firstChoice} route=${payload.route}`,
              message: JSON.stringify(payload, null, 2),
              firstChoice: payload.firstChoice,
              route: payload.route,
              q1: payload.q1,
              q2: payload.q2,
              q3: payload.q3,
              timestamp: payload.timestamp,
            });
          } else {
            console.warn("EmailJS not configured. Payload:", payload);
          }

          setHash("#/done");
        } catch (e) {
          console.error(e);
          status.textContent = "전송 실패: EmailJS 설정/네트워크를 확인하세요.";
          sendBtn.disabled = false;
        }
      });
    }

    function pageDone(){
      document.body.innerHTML = `<div class="done">전송이 완료되었습니다</div>`;
    }

    function router(){
      const h = location.hash || "#/intro";
      switch (h) {
        case "#/intro": pageIntro(); break;

        case "#/": page1(); break;
        case "#/q1": pageQ1(); break;
        case "#/rand": pageRand(); break;

        case "#/3-1/1": state.route = "3-1"; page31_1(); break;
        case "#/3-1/2": state.route = "3-1"; page31_2(); break;

        case "#/3-2/1": state.route = "3-2"; page32_1(); break;
        case "#/3-2/2": state.route = "3-2"; page32_2(); break;

        case "#/q2": pageQ2(); break;
        case "#/q3": pageQ3(); break;

        case "#/done": pageDone(); break;

        default:
          setHash("#/intro");
      }
    }

    window.addEventListener("hashchange", router);
    router();
  </script>
</body>
</html>
