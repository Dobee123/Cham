<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>설문조사</title>
  <style>
    :root {
      --max: 980px;
      --gap: 12px;
      --bd: #e5e7eb;
      --fg: #111827;
      --muted: #6b7280;
      --btn: #111827;
      --btnfg: #fff;
      --thead: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      color: var(--fg);
      background: #fff;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .card {
      border: 1px solid var(--bd);
      border-radius: 16px;
      padding: 18px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 6px;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    .btn {
      width: 100%;
      padding: 14px 12px;
      border-radius: 12px;
      border: 1px solid var(--bd);
      background: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .btn:hover { border-color: #cbd5e1; }

    .btn-primary {
      background: var(--btn);
      color: var(--btnfg);
      border-color: var(--btn);
    }

    .btn-primary:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .row {
      display: flex;
      gap: var(--gap);
      align-items: center;
      justify-content: flex-end;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .question {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 12px;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    label.opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 12px;
      border: 1px solid var(--bd);
      border-radius: 12px;
      cursor: pointer;
    }

    label.opt:hover { border-color: #cbd5e1; }

    input[type="radio"] { transform: scale(1.1); }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--bd);
      color: var(--muted);
    }

    .imgbox {
      width: 100%;
      border: 1px solid var(--bd);
      border-radius: 16px;
      overflow: hidden;
      background: #f9fafb;
      margin-top: 12px;
    }

    .imgbox img {
      display: block;
      width: 100%;
      height: auto;
    }

    .done {
      min-height: 60vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      font-weight:800;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    .intro {
      min-height: 60vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:14px;
      padding:10px 6px;
      position: relative;
    }

    .intro-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.2px;
      margin: 0;
    }

    .admin-btn {
      position:absolute;
      top: 10px;
      right: 10px;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 999px;
      border:1px solid var(--bd);
      background:#fff;
      cursor:pointer;
      font-weight:800;
      width:auto;
    }

    .admin-btn:hover { border-color:#cbd5e1; }

    .loginBox {
      max-width: 340px;
      margin: 0 auto;
      width:100%;
    }

    .input {
      width: 100%;
      max-width: 340px;
      padding: 10px 12px;
      border: 1px solid var(--bd);
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }

    .input:focus { border-color:#cbd5e1; }

    .list {
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .item {
      border:1px solid var(--bd);
      border-radius:12px;
      padding:12px;
      cursor:pointer;
    }

    .item:hover { border-color:#cbd5e1; }

    .item-top {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      color: var(--muted);
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background:#f9fafb;
      border:1px solid var(--bd);
      border-radius:12px;
      padding:12px;
      margin-top: 12px;
    }

    .sq-page {
      display:grid;
      gap:18px;
    }

    .sq-title-box {
      display:inline-block;
      margin:0 auto 6px;
      padding:12px 22px;
      background:#111;
      color:#fff;
      border-radius:10px;
      font-size:22px;
      font-weight:800;
      text-align:center;
    }

    .sq-block {
      border:1px solid var(--bd);
      border-radius:14px;
      padding:16px;
      background:#fff;
    }

    .sq-q {
      font-size:17px;
      font-weight:800;
      margin:0 0 12px;
      line-height:1.55;
    }

    .sq-note {
      font-size:14px;
      color: var(--muted);
      line-height:1.7;
      margin:10px 0 14px;
      white-space: pre-line;
    }

    .sq-options {
      display:grid;
      gap:10px;
    }

    .sq-inline {
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:10px;
    }

    .sq-inline-3 {
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:10px;
    }

    .sq-inline-4 {
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:10px;
    }

    .sq-inline-5 {
      display:grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap:10px;
    }

    .sq-opt {
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:12px;
      border:1px solid var(--bd);
      border-radius:12px;
      cursor:pointer;
      line-height:1.45;
      background:#fff;
    }

    .sq-opt:hover { border-color:#cbd5e1; }

    .sq-opt input[type="radio"] {
      margin-top:2px;
      transform: scale(1.1);
      flex:0 0 auto;
    }

    .sq-opt span { word-break: keep-all; }

    .fact-table-wrap {
      overflow-x:auto;
      border:1px solid var(--bd);
      border-radius:14px;
      margin-top:14px;
    }

    .fact-table {
      width:100%;
      border-collapse:collapse;
      min-width:760px;
      background:#fff;
    }

    .fact-table th,
    .fact-table td {
      border:1px solid var(--bd);
      padding:12px 10px;
      vertical-align:middle;
      text-align:center;
    }

    .fact-table thead th {
      background: var(--thead);
      font-weight:800;
    }

    .fact-table .fact-text {
      text-align:left;
      line-height:1.6;
      word-break: keep-all;
    }

    .fact-table .fact-no {
      width:56px;
      font-weight:700;
    }

    .fact-table .fact-col {
      width:90px;
    }

    .fact-radio {
      transform: scale(1.15);
    }

    .news-title {
      font-weight:800;
      margin:18px 0 10px;
      font-size:16px;
    }

    .news-links {
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .news-link {
      display:block;
      padding:14px 16px;
      border:1px solid var(--bd);
      border-radius:12px;
      background:#fff;
      color: var(--fg);
      text-decoration:none;
      line-height:1.5;
      cursor:pointer;
      font-weight:700;
      text-align:left;
    }

    .news-link:hover {
      border-color:#cbd5e1;
      background:#f9fafb;
    }

    .news-link.disabled {
      pointer-events:none;
      color:#9ca3af;
      text-decoration:none;
      background:#f3f4f6;
      cursor:not-allowed;
    }

    .news-link:active {
      transform: translateY(1px);
    }

    @media (max-width:640px) {
      .sq-inline,
      .sq-inline-3,
      .sq-inline-4,
      .sq-inline-5 {
        grid-template-columns:1fr;
      }

      .sq-title-box { width:100%; }
    }

    @media (max-width:520px) {
      .loginBox { max-width:100%; }
      .input { max-width:100%; }
    }
  </style>
</head>

    function fetchAdminList({ limit = 200 } = {}) {
      return new Promise((resolve, reject) => {
        const cbName = "jsonp_cb_" + Math.random().toString(16).slice(2);
        const script = document.createElement("script");
        const url = `${GS_WEBAPP_URL}?action=list&limit=${encodeURIComponent(limit)}&callback=${encodeURIComponent(cbName)}&_=${Date.now()}`;

        let done = false;

        function cleanup() {
          if (done) return;
          done = true;
          try { delete window[cbName]; } catch (e) {}
          try { script.remove(); } catch (e) {}
          try { clearTimeout(timer); } catch (e) {}
        }

        window[cbName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("관리 목록 조회 실패(script load error)"));
        };

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("관리 목록 조회 실패(timeout)"));
        }, 8000);

        script.src = url;
        script.async = true;
        document.head.appendChild(script);
      });
    }

    function router() {
      const h = location.hash || "#/intro";

      if (h === "#/intro") return pageIntro();
      if (h === "#/admin-login") return pageAdminLogin();
      if (h === "#/admin") return pageAdmin();

      if (h === "#/") return pageSQ();
      if (h === "#/q1") return pageTopicChoice();

      if (h === "#/4-1") return page41();
      if (h === "#/4-2") return page42();
      if (h === "#/4-3") return page43();
      if (h === "#/4-4") return page44();
      if (h === "#/4-5") return page45();

      if (h === "#/page5") return page5();
      if (h === "#/rand") return pageRand();

      const articleMatch = h.match(/^#\/(6-1|6-2|62-1|62-2|63-1|63-2|64-1|64-2|65-1|65-2)(?:-([1-4]))?$/);
      if (articleMatch) {
        const routeKey = articleMatch[2] ? `${articleMatch[1]}-${articleMatch[2]}` : articleMatch[1];
        return articlePage(routeKey);
      }

      if (h === "#/q2") return pageQ2();
      if (h === "#/q3") return pageQ3();
      if (h === "#/screenout") return pageScreenout();
      if (h === "#/done") return pageDone();

      return setHash("#/intro");
    }

    (function forceIntroOnFirstLoad() {
      const BOOT_KEY = "survey_boot_v1";
      const h = location.hash || "";
      const firstLoad = !sessionStorage.getItem(BOOT_KEY);

      if (firstLoad) {
        sessionStorage.setItem(BOOT_KEY, "1");
        if (h === "" || h === "#" || h === "#/") {
          location.hash = "#/intro";
        }
      }
    })();

    window.addEventListener("hashchange", router);
    router();
  </script>
</body>
